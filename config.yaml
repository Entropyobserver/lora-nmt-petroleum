project:
  name: lora-nmt-translation
  seed: 42

model:
  pretrained: facebook/nllb-200-distilled-600M
  src_lang: eng_Latn   
  tgt_lang: nob_Latn   
  max_length: 128
  dtype: float16

lora:
  r: 16
  alpha: 32
  dropout: 0.1
  target_modules: [q_proj, v_proj, k_proj, out_proj]

training:
  epochs: 3
  batch_size: 4
  grad_accumulation: 4
  lr: 5.0e-4
  warmup_steps: 100
  eval_steps: 200
  early_stopping_patience: 3
  fp16: true

generation:
  max_length: 128
  num_beams: 5

data:
  train: data/final_splits_npd/train.json
  val:   data/final_splits_npd/val.json
  test:  data/final_splits_npd/test.json

paths:
  output_dir: outputs
  models_dir: trained_models
  data_dir: .

experiment:
  seeds: [42, 123, 456]
  num_trials: 50
  stage1:
    epochs: 1
    early_stopping_patience: 1
    eval_steps: 100